<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B6B1A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Bloom"/>
  <title>Bloom 🌻</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
/* Bloom v3 — Clean, premium, botanical */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:       #3B6B1A;
  --green-mid:   #4E8A24;
  --green-lt:    #6FAF3A;
  --amber:       #D4860A;
  --amber-lt:    #F5A623;
  --soil:        #5C3A1E;
  --parchment:   #F5EFE4;
  --parchment2:  #EDE4D3;
  --parchment3:  #E2D5C0;
  --border:      #D4C4A8;
  --text:        #2A1A0A;
  --text-mid:    #5C3A1E;
  --text-muted:  #907050;
  --white:       #FFFFFF;
  --danger:      #C0392B;

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;

  --shadow-sm: 0 1px 8px rgba(42,26,10,0.08);
  --shadow-md: 0 4px 20px rgba(42,26,10,0.10);

  --f-serif: 'Lora', Georgia, serif;
  --f-sans:  'DM Sans', system-ui, sans-serif;

  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  font-family: var(--f-sans);
  background: var(--parchment);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

#app {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  padding-top: var(--safe-t);
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ════════════════════════════════════
   ONBOARDING
════════════════════════════════════ */
#screen-onboard {
  background: linear-gradient(175deg, #C8DFA8 0%, #F5EFE4 45%, #EDE4D3 100%);
  justify-content: flex-end;
  overflow-y: auto;
}

.ob-hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 2rem 1.5rem 0.5rem;
  min-height: 160px;
}

.ob-logo {
  font-family: var(--f-serif);
  font-size: 2.8rem;
  font-weight: 600;
  color: var(--green);
  letter-spacing: -0.5px;
  line-height: 1;
}
.ob-tagline {
  font-family: var(--f-serif);
  font-style: italic;
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}
.ob-flower-preview {
  width: 140px;
  margin-top: 1rem;
  opacity: 0.9;
}

.ob-panel {
  background: var(--white);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 2rem 1.5rem calc(2.5rem + var(--safe-b));
  box-shadow: 0 -4px 32px rgba(42,26,10,0.12);
  overflow-y: auto;
  max-height: 74vh;
}

.step { display: none; }
.step.active { display: block; }

.step-heading {
  font-family: var(--f-serif);
  font-size: 1.45rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.3rem;
  line-height: 1.25;
}
.step-sub {
  font-size: 0.84rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

/* Identity field */
.id-field {
  display: flex;
  align-items: center;
  background: var(--parchment);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.8rem 1rem;
  margin-bottom: 1.5rem;
  transition: border-color 0.2s, background 0.2s;
}
.id-field:focus-within {
  border-color: var(--green-mid);
  background: var(--white);
}
.id-prefix {
  font-family: var(--f-serif);
  font-style: italic;
  color: var(--text-muted);
  font-size: 0.88rem;
  white-space: nowrap;
  margin-right: 6px;
  flex-shrink: 0;
}
.id-input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--f-sans);
  font-size: 0.9rem;
  color: var(--text);
  width: 100%;
  font-weight: 500;
}
.id-input::placeholder { color: var(--text-muted); font-weight: 300; }

/* Habit chips */
.habits-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  margin-bottom: 1rem;
}
.h-chip {
  background: var(--parchment);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.85rem 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-sans);
  font-size: 0.84rem;
  color: var(--text-mid);
  transition: all 0.15s;
  text-align: left;
}
.h-chip .chip-em { font-size: 1.2rem; }
.h-chip.sel {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.h-chip:active { transform: scale(0.97); }

.custom-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.c-input {
  flex: 1;
  background: var(--parchment);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.7rem 1rem;
  font-family: var(--f-sans);
  font-size: 0.86rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.c-input:focus { border-color: var(--green-mid); background: var(--white); }
.btn-plus {
  width: 44px; height: 44px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  font-size: 1.5rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  line-height: 1;
}
.btn-plus:active { background: var(--green-mid); }

.sel-count {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: right;
  margin-bottom: 1rem;
  min-height: 18px;
}

.btn-primary {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  padding: 0.95rem;
  font-family: var(--f-serif);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 4px 16px rgba(59,107,26,0.28);
}
.btn-primary:active { transform: scale(0.98); background: var(--green-mid); }
.btn-primary:disabled {
  background: var(--parchment3);
  color: var(--text-muted);
  box-shadow: none;
  cursor: default;
  transform: none;
}

/* ════════════════════════════════════
   MAIN APP
════════════════════════════════════ */
#screen-main {
  background: var(--parchment);
}

/* Header */
.app-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: calc(0.85rem + var(--safe-t)) 1.25rem 0.85rem;
  flex-shrink: 0;
}
.hdr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr-logo {
  font-family: var(--f-serif);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--green);
  letter-spacing: -0.3px;
}
.hdr-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.streak-pill {
  background: var(--amber-lt);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.01em;
}
.streak-pill.cold {
  background: var(--parchment2);
  color: var(--text-muted);
}
.hdr-identity {
  font-size: 0.76rem;
  color: var(--text-muted);
  font-style: italic;
  font-family: var(--f-serif);
  margin-top: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hdr-identity b {
  color: var(--amber);
  font-style: normal;
  font-weight: 600;
}

/* Tab content */
.tab-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-pane {
  display: none;
  padding: 1.25rem 1.25rem calc(90px + var(--safe-b));
}
.tab-pane.active { display: block; }

/* ── GARDEN TAB ── */

/* Flower card */
.flower-card {
  background: var(--white);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  padding: 1.5rem 1rem 0.75rem;
  margin-bottom: 1.25rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.flower-card-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #EAF4D8 0%, #F8F4EC 60%, #EDE4D3 100%);
  z-index: 0;
}
.flower-img-wrap {
  position: relative;
  z-index: 1;
  width: 220px;
  height: 220px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.flower-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  opacity: 1;
  filter: drop-shadow(0 6px 16px rgba(42,26,10,0.12));
}
.flower-status {
  position: relative;
  z-index: 1;
  text-align: center;
  margin-top: 0.6rem;
  width: 100%;
}
.flower-stage-name {
  font-family: var(--f-serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--green);
}
.flower-stage-sub {
  font-size: 0.76rem;
  color: var(--text-muted);
  margin-top: 2px;
  font-style: italic;
}

/* Progress ring / bar */
.progress-wrap {
  width: 100%;
  margin-top: 1rem;
  position: relative;
  z-index: 1;
}
.progress-track {
  height: 8px;
  background: var(--parchment2);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-mid), var(--amber-lt));
  border-radius: 20px;
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  min-width: 0;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.73rem;
  color: var(--text-muted);
  margin-bottom: 5px;
}

/* Reset indicator */
.reset-note {
  text-align: center;
  font-size: 0.71rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
  position: relative;
  z-index: 1;
  font-style: italic;
  padding-bottom: 0.25rem;
}

/* Section heading */
.s-head {
  font-family: var(--f-serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.85rem;
}

/* Habit cards */
.habit-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 1rem 1.1rem;
  margin-bottom: 0.65rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  box-shadow: var(--shadow-sm);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.habit-card:active { transform: scale(0.985); }
.habit-card.done {
  background: linear-gradient(135deg, #F4FBE8, #EEF7D8);
  border-color: var(--green-lt);
}
.check-circle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--parchment);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 1rem;
  color: transparent;
}
.habit-card.done .check-circle {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
  font-size: 1rem;
}
.habit-info { flex: 1; min-width: 0; }
.habit-name {
  font-size: 0.93rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.habit-meta {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 3px;
}
.week-dots {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.wd {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--parchment2);
  font-size: 0.48rem;
  color: var(--text-muted);
  display: grid;
  place-items: center;
}
.wd.done { background: var(--green); border-color: var(--green); }
.wd.today { border-color: var(--amber-lt); border-width: 2px; }
.wd.miss { background: #FFE8E5; border-color: #F4A49A; }

/* ── JOURNAL TAB ── */
.date-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0.6rem 0 0.35rem;
}
.journal-entry {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.85rem 1rem;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.85rem;
  box-shadow: var(--shadow-sm);
}
.je-icon { font-size: 1.15rem; flex-shrink: 0; }
.je-body { flex: 1; min-width: 0; }
.je-habit { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.je-meta { font-size: 0.71rem; color: var(--text-muted); margin-top: 2px; }
.empty-state {
  text-align: center;
  padding: 3.5rem 1rem;
  color: var(--text-muted);
}
.empty-icon { font-size: 2.8rem; margin-bottom: 0.75rem; }
.empty-txt {
  font-family: var(--f-serif);
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.6;
}

/* ── SETTINGS TAB ── */
.settings-section { margin-bottom: 1.5rem; }
.settings-section-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
}
.settings-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.settings-row:last-child { border-bottom: none; }
.settings-row:active { background: var(--parchment); }
.sr-icon { font-size: 1.1rem; flex-shrink: 0; width: 24px; text-align: center; }
.sr-body { flex: 1; }
.sr-title { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.sr-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
.sr-caret { color: var(--text-muted); font-size: 1rem; }
.sr-title.danger { color: var(--danger); }

/* Toggle */
.toggle-wrap { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle-inp { position: absolute; opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--parchment3);
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.22s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform 0.22s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}
.toggle-inp:checked + .toggle-slider { background: var(--green); }
.toggle-inp:checked + .toggle-slider::before { transform: translateX(18px); }

.version-note {
  text-align: center;
  font-size: 0.73rem;
  color: var(--text-muted);
  font-style: italic;
  font-family: var(--f-serif);
  padding: 1rem 0 0.5rem;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-b);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(42,26,10,0.07);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 0.65rem 0 0.5rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-family: var(--f-sans);
  font-size: 0.64rem;
  font-weight: 400;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--green); }
.nav-ico { font-size: 1.35rem; line-height: 1; }

/* ── INSTALL BANNER ── */
.install-banner {
  position: fixed;
  bottom: calc(72px + var(--safe-b));
  left: 1rem; right: 1rem;
  background: var(--green);
  color: #fff;
  border-radius: var(--r-md);
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 500;
  box-shadow: 0 4px 24px rgba(59,107,26,0.35);
  transform: translateY(120%);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
.install-banner.show { transform: translateY(0); }
.ib-text { flex: 1; font-size: 0.82rem; line-height: 1.4; }
.ib-text b { display: block; font-size: 0.88rem; margin-bottom: 1px; }
.btn-install {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.5);
  color: #fff;
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  font-weight: 500;
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
}
.btn-dismiss {
  background: none; border: none;
  color: rgba(255,255,255,0.65);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.2rem;
}

/* ── CONFETTI ── */
.conf {
  position: absolute;
  border-radius: 2px;
  pointer-events: none;
  animation: confFall 1.2s ease-out forwards;
}
@keyframes confFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(200px) rotate(420deg); }
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(82px + var(--safe-b));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--soil);
  color: #fff;
  padding: 0.6rem 1.2rem;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s ease;
  white-space: nowrap;
  z-index: 999;
  pointer-events: none;
  max-width: 88vw;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── UTIL ── */
@media (min-width: 480px) {
  .ob-panel, .tab-pane { max-width: 460px; margin-left: auto; margin-right: auto; }
  .bottom-nav {
    max-width: 460px;
    left: 50%; right: auto;
    transform: translateX(-50%);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
}

  </style>
</head>
<body>
  <div id="app"></div>
  <div id="fx-root"></div>
  <div id="toast-root"></div>

};
let S = {};

function save() { try { localStorage.setItem('bloom_v3', JSON.stringify(S)); } catch(e) {} }
function load() {
  try {
    const d = localStorage.getItem('bloom_v3');
    if (d) { S = { ...DEFAULTS, ...JSON.parse(d) }; return true; }
  } catch(e) {}
  S = { ...DEFAULTS };
  return false;
}

function todayKey() { return new Date().toISOString().slice(0, 10); }
function fmtDate(k) {
  return new Date(k + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
}
function weekKeys() {
  const out = [], now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    out.push({ key: d.toISOString().slice(0,10), day: DAYS[d.getDay()], isToday: i === 0 });
  }
  return out;
}
function timeUntilMidnight() {
  const now = new Date(), mid = new Date(now);
  mid.setHours(24,0,0,0);
  const ms = mid - now;
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `Resets in ${h}h ${m}m` : `Resets in ${m}m`;
}

function todayDone() { return S.checkins[todayKey()] || []; }
function todayPct() {
  if (!S.habits.length) return 0;
  return Math.round((todayDone().length / S.habits.length) * 100);
}
function getStage() {
  const pct = todayPct();
  if (pct >= 100) return STAGES[4];
  if (pct >= 67)  return STAGES[3];
  if (pct >= 34)  return STAGES[2];
  if (pct >= 1)   return STAGES[1];
  return STAGES[0];
}
function isHabitDone(name) { return todayDone().includes(name); }

function recalcStreak(name) {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const key = d.toISOString().slice(0,10);
    if ((S.checkins[key] || []).includes(name)) streak++;
    else if (i > 0) break;
  }
  S.streaks[name] = streak;
}
function recalcOverallStreak() {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const done = S.checkins[key] || [];
    if (i === 0) { streak = 0; continue; }
    if (S.habits.length > 0 && done.length >= S.habits.length) streak++;
    else break;
  }
  if (S.habits.length > 0 && todayDone().length >= S.habits.length) streak++;
  S.overallStreak = streak;
}

  const stage = getStage(), pct = todayPct();
  const done = todayDone().length, total = S.habits.length;
  const img = el('flower-img');
  if (img) { img.src = stage.img; img.style.opacity = '1'; }
  const nameEl = el('flower-stage-name'), subEl = el('flower-stage-sub');
  if (nameEl) nameEl.textContent = stage.name;
  if (subEl)  subEl.textContent  = stage.sub;
  const fill  = el('progress-fill');
  const lLeft = el('prog-label-left'), lRight = el('prog-label-right');
  const reset = el('reset-note');
  if (fill)   fill.style.width = Math.max(0, pct) + '%';
  if (lLeft)  lLeft.textContent  = `${done} of ${total} habits`;
  if (lRight) lRight.textContent = pct + '%';
  if (reset)  reset.textContent  = timeUntilMidnight();
}

function renderHabits() {
  const list = el('habit-list');
  if (!list) return;
  list.innerHTML = '';
  if (!S.habits.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-txt">No habits yet.</div></div>';
    return;
  }
  const wk = weekKeys(), today = todayKey();
  S.habits.forEach(h => {
    const done = isHabitDone(h.name), streak = S.streaks[h.name] || 0;
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="check-circle">${done ? '✓' : ''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.emoji} ${h.name}</div>
        <div class="habit-meta">🔥 ${streak} day streak</div>
        <div class="week-dots">${wk.map(w => {
          const d = (S.checkins[w.key] || []).includes(h.name);
          const miss = !d && !w.isToday && w.key < today;
          return `<div class="wd ${d?'done':''} ${w.isToday?'today':''} ${miss?'miss':''}">${w.day}</div>`;
        }).join('')}</div>
      </div>`;
    card.addEventListener('click', () => toggleCheckin(h.name));
    list.appendChild(card);
  });
}

function toggleCheckin(name) {
  const today = todayKey();
  if (!S.checkins[today]) S.checkins[today] = [];
  const idx = S.checkins[today].indexOf(name);
  if (idx === -1) {
    S.checkins[today].push(name);
    recalcStreak(name);
    recalcOverallStreak();
    const pct = todayPct();
    popConfetti();
    showToast(pct === 100 ? '🌻 Full bloom! Every habit done!' : checkinMsg(pct));
  } else {
    S.checkins[today].splice(idx, 1);
    recalcStreak(name);
    recalcOverallStreak();
  }
  save();
  renderGarden();
}

function checkinMsg(pct) {
  if (pct < 34)  return '🌱 Keep going, your sprout is waiting!';
  if (pct < 67)  return '🌿 Growing nicely — halfway there!';
  if (pct < 100) return '🌼 Almost in full bloom!';
  return '🌻 Full bloom!';
}

function updateHeader() {
  recalcOverallStreak();
  const pill = el('streak-pill');
  if (!pill) return;
  if (S.overallStreak > 0) { pill.textContent = `🔥 ${S.overallStreak}d`; pill.classList.remove('cold'); }
  else { pill.textContent = '0 days'; pill.classList.add('cold'); }
}

function renderJournal() {
  const list = el('journal-list');
  if (!list) return;
  const dates = Object.keys(S.checkins).sort().reverse();
  if (!dates.length || !dates.some(d => S.checkins[d].length > 0)) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-txt">Your journal is empty.<br>Check in on a habit to start your story.</div></div>';
    return;
  }
  let html = '';
  dates.forEach(dateKey => {
    const done = S.checkins[dateKey];
    if (!done || !done.length) return;
    const total = S.habits.length;
    const pct = total ? Math.round(done.length / total * 100) : 0;
    html += `<div class="date-label">${fmtDate(dateKey)}</div>`;
    done.forEach(name => {
      const h = S.habits.find(h => h.name === name) || { emoji: '🌱', name };
      html += `<div class="journal-entry">
        <div class="je-icon">${h.emoji}</div>
        <div class="je-body">
          <div class="je-habit">${h.name}</div>
          <div class="je-meta">${done.length}/${total} habits done · ${pct}%</div>
        </div>
        <span style="font-size:1rem">${pct >= 100 ? '🌻' : '✓'}</span>
      </div>`;
    });
  });
  list.innerHTML = html;
}

function renderSettings() {
  const id = el('settings-identity');
  if (id) id.textContent = S.identity || '—';
}

function resetData() {
  if (!confirm('Reset all data and start fresh? Cannot be undone.')) return;
  localStorage.removeItem('bloom_v3');
  location.reload();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el('tab-' + tab).classList.add('active');
  el('nav-' + tab).classList.add('active');
  if (tab === 'journal')  renderJournal();
  if (tab === 'settings') renderSettings();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(id).classList.add('active');
}

function buildDOM() {
  el('app').innerHTML = `
<div class="screen active" id="screen-onboard">
  <div class="ob-hero">
    <div class="ob-logo">Bloom</div>
    <div class="ob-tagline">show up. grow something.</div>
    <img class="ob-flower-preview" src="${imgs['stage5']}" alt="Sunflower"/>
  </div>
  <div class="ob-panel">
    <div class="step active" id="step-1">
      <div class="step-heading">Who do you want to become?</div>
      <div class="step-sub">Set your intention. You will see it every time you open the app.</div>
      <div class="id-field">
        <span class="id-prefix">I am a person who</span>
        <input class="id-input" id="id-input" type="text" placeholder="reads every day..." autocomplete="off"/>
      </div>
      <button class="btn-primary" id="btn-step1" disabled>Choose my habits &rarr;</button>
    </div>
    <div class="step" id="step-2">
      <div class="step-heading">Pick your habits</div>
      <div class="step-sub">Up to 5. Your sunflower grows as you check them off each day.</div>
      <div class="habits-grid" id="habits-grid"></div>
      <div class="custom-row">
        <input class="c-input" id="c-input" placeholder="Add your own..."/>
        <button class="btn-plus" id="btn-plus">+</button>
      </div>
      <div class="sel-count" id="sel-count"></div>
      <button class="btn-primary" id="btn-step2" disabled>Start growing &#127807;</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-main">
  <header class="app-header">
    <div class="hdr-row">
      <div class="hdr-logo">Bloom</div>
      <div class="hdr-right">
        <div class="streak-pill cold" id="streak-pill">0 days</div>
      </div>
    </div>
    <div class="hdr-identity" id="hdr-identity"></div>
  </header>
  <div class="tab-content">
    <div class="tab-pane active" id="tab-garden">
      <div class="flower-card">
        <div class="flower-card-bg"></div>
        <div class="flower-img-wrap">
          <img class="flower-img" id="flower-img" src="" alt="Your sunflower"/>
        </div>
        <div class="flower-status">
          <div class="flower-stage-name" id="flower-stage-name">Seeds planted</div>
          <div class="flower-stage-sub"  id="flower-stage-sub">Check off a habit to start growing</div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span id="prog-label-left">0 of 0 habits</span>
              <span id="prog-label-right">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
          </div>
          <div class="reset-note" id="reset-note"></div>
        </div>
      </div>
      <div class="s-head">Today's habits</div>
      <div id="habit-list"></div>
    </div>
    <div class="tab-pane" id="tab-journal">
      <div class="s-head">Journal</div>
      <div id="journal-list"></div>
    </div>
    <div class="tab-pane" id="tab-settings">
      <div class="s-head">Settings</div>
      <div class="settings-section">
        <div class="settings-section-label">Your identity</div>
        <div class="settings-card">
          <div class="settings-row" style="cursor:default">
            <div class="sr-icon">&#127807;</div>
            <div class="sr-body">
              <div class="sr-title">I am a person who...</div>
              <div class="sr-sub" id="settings-identity">&#8212;</div>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-label">Data</div>
        <div class="settings-card">
          <div class="settings-row" onclick="resetData()">
            <div class="sr-icon">&#128465;</div>
            <div class="sr-body">
              <div class="sr-title danger">Reset all data</div>
              <div class="sr-sub">Start fresh &#8212; cannot be undone</div>
            </div>
            <div class="sr-caret">&#8250;</div>
          </div>
        </div>
      </div>
      <div class="version-note">Bloom &middot; Made with &#127807; and stubbornness</div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-garden"   onclick="switchTab('garden')"><div class="nav-ico">&#127968;</div><span>Garden</span></button>
    <button class="nav-btn"        id="nav-journal"  onclick="switchTab('journal')"><div class="nav-ico">&#128218;</div><span>Journal</span></button>
    <button class="nav-btn"        id="nav-settings" onclick="switchTab('settings')"><div class="nav-ico">&#9881;</div><span>Settings</span></button>
  </nav>
</div>`;
}

const selectedHabits = new Set();

function setupOnboarding() {
  const idInp = el('id-input');
  idInp.addEventListener('input', () => { el('btn-step1').disabled = idInp.value.trim().length < 2; });
  el('btn-step1').addEventListener('click', () => {
    S.identity = idInp.value.trim();
    el('step-1').classList.remove('active');
    el('step-2').classList.add('active');
  });
  const grid = el('habits-grid');
  SUGGESTIONS.forEach(h => {
    const chip = document.createElement('button');
    chip.className = 'h-chip';
    chip.innerHTML = '<span class="chip-em">' + h.emoji + '</span><span>' + h.name + '</span>';
    chip.addEventListener('click', () => {
      if (selectedHabits.has(h.name)) { selectedHabits.delete(h.name); chip.classList.remove('sel'); }
      else if (selectedHabits.size < 5) { selectedHabits.add(h.name); chip.classList.add('sel'); }
      else showToast('Maximum 5 habits');
      updateSelCount();
    });
    grid.appendChild(chip);
  });
  el('btn-plus').addEventListener('click', addCustom);
  el('c-input').addEventListener('keydown', e => { if (e.key === 'Enter') addCustom(); });
  el('btn-step2').addEventListener('click', plantGarden);
}

function addCustom() {
  const val = el('c-input').value.trim();
  if (!val) return;
  if (selectedHabits.size >= 5) { showToast('Maximum 5 habits'); return; }
  if (selectedHabits.has(val)) return;
  selectedHabits.add(val);
  const chip = document.createElement('button');
  chip.className = 'h-chip sel';
  chip.innerHTML = '<span class="chip-em">&#127807;</span><span>' + val + '</span>';
  chip.addEventListener('click', () => { selectedHabits.delete(val); chip.remove(); updateSelCount(); });
  el('habits-grid').appendChild(chip);
  el('c-input').value = '';
  updateSelCount();
}

function updateSelCount() {
  el('btn-step2').disabled = selectedHabits.size === 0;
  const c = el('sel-count');
  if (c) c.textContent = selectedHabits.size > 0 ? selectedHabits.size + '/5 selected' : '';
}

function plantGarden() {
  S.habits = []; S.checkins = {}; S.streaks = {}; S.overallStreak = 0;
  selectedHabits.forEach(name => {
    const found = SUGGESTIONS.find(h => h.name === name);
    S.habits.push({ name, emoji: found ? found.emoji : '&#127807;' });
    S.streaks[name] = 0;
  });
  S.onboarded = true;
  save();
  launchApp();
}

function launchApp() {
  showScreen('screen-main');
  const hid = el('hdr-identity');
  if (hid) hid.innerHTML = 'I am a person who <b>' + S.identity + '</b>';
  S.habits.forEach(h => recalcStreak(h.name));
  recalcOverallStreak();
  renderGarden();
  renderSettings();
  setInterval(() => { const r = el('reset-note'); if (r) r.textContent = timeUntilMidnight(); }, 60000);
}

function popConfetti() {
  const root = el('fx-root');
  for (let i = 0; i < 32; i++) {
    const p = document.createElement('div');
    p.className = 'conf';
    p.style.cssText = 'background:' + CONF_COLORS[i % CONF_COLORS.length] + ';left:' + (10+Math.random()*80) + '%;top:' + (15+Math.random()*30) + '%;width:' + (7+Math.random()*6) + 'px;height:' + (7+Math.random()*6) + 'px;animation-delay:' + (Math.random()*0.3) + 's;border-radius:' + (Math.random()>0.5?'50%':'2px');
    root.appendChild(p);
  }
  setTimeout(() => { root.innerHTML = ''; }, 1500);
}

let toastTimer;
function showToast(msg) {
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; el('toast-root').appendChild(t); }
  clearTimeout(toastTimer);
  t.textContent = msg; t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

document.addEventListener('DOMContentLoaded', () => {
  buildDOM();
  load();
  if (S.onboarded && S.habits && S.habits.length) { launchApp(); }
  else { setupOnboarding(); showScreen('screen-onboard'); }
});

  </script>
</body>
